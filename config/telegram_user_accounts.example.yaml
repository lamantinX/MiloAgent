# =============================================================================
# Telegram User Account Configuration (Telethon) — TEMPLATE
# =============================================================================
# Copy this file to telegram_user_accounts.local.yaml and fill in real values.
# NEVER commit the .local.yaml file — it contains secrets.
#
# api_id / api_hash: https://my.telegram.org → API development tools
# session_file: auto-generated by QR/SMS login flow
# =============================================================================

accounts:
  - account_id: "telegram_primary"
    business_id: "example_business"
    account_type: "user"
    api_id: "YOUR_TELEGRAM_API_ID"
    api_hash: "YOUR_TELEGRAM_API_HASH"
    phone: ""
    session_file: "data/sessions/telegram_example_business_telegram_primary.session"
    auth_status: "not_authorized"
    enabled: false
    persona: "helpful_casual"
    assigned_products:
      - "example_product"
    cooldown_minutes: 15
    max_messages_per_hour: 5
    max_messages_per_day: 20
    target_groups: []
    action_mode: "approval"
    auto_discover: false
    auto_join: false
